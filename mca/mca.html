<html>

<head>

</head>

<body>
  <div>
    <canvas id="scope" width=600 height=200></canvas>
    <br>
    <canvas id="histogram" width=2048 height=400></canvas>
    <br>
    <span id="histogram-values"></span>
    <br>
    <pre id="console"></pre>
  </div>
  <script>
    (async function () {
      window.AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioContext = new AudioContext();

      // histogram
      const channels = 2048;
      const histogram = new Array(channels).fill(0);
      const noise = 30;

      // oscilloscope
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;

      // pulse processor
      await audioContext.audioWorklet.addModule('pulse-processor.js')
        .catch(e => {
          addDebug(`unable to add worklet: ${e}`);
        });
      const pulseProcessor = new AudioWorkletNode(audioContext, 'pulse-processor');
      pulseProcessor.port.onmessage = (event) => {
        const pulses = event.data;
        addDebug(`pulses: ${pulses.length}`);

        for (pulse of pulses) {
          const bin = pulse / 1 * (histogram.length - 1);
          if (bin > noise) {
            histogram[bin]++;
          }
        }
      };

      const pulseProcessor2 = audioCtx.createScriptProcessor(4096, 1, 1);

      const minFrontPoints = 4;
      const maxFrontPoints = 12;
      let currentFrontPoints = 0;
      let prevValue = 0;
      let frontStartValue = 0;
      pulseProcessor2.addEventListener("audioprocess", (audioProcessingEvent) => {
        // The input buffer is the song we loaded earlier
        let inputBuffer = audioProcessingEvent.inputBuffer;
        let inputChannelData = inputBuffer.getChannelData(0);

        const pulses = [];
        if (inputChannelData) {
          for (i = 0; i < inputChannelData.length; i++) {
            const currentValue = inputChannelData[i] + 1; // from 0 to 2
            if (currentValue > prevValue) {
              if (currentFrontPoints === 0) {
                frontStartValue = prevValue;
              }

              currentFrontPoints++;
            } else {
              if (currentFrontPoints >= minFrontPoints && currentFrontPoints <= maxFrontPoints) {
                pulses.push(currentValue - frontStartValue);
              } else {
                frontStartValue = 0;
                currentFrontPoints = 0;
              }
            }

            prevValue = currentValue;
          }
        }

        addDebug(`pulses: ${pulses.length}`);

        for (pulse of pulses) {
          const bin = pulse / 1 * (histogram.length - 1);
          if (bin > noise) {
            histogram[bin]++;
          }
        }
      });

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then((stream) => {
          const microphone = audioContext.createMediaStreamSource(stream);
          microphone.connect(pulseProcessor2);
          microphone.connect(analyser);
        })
        .catch(e => {
          addDebug(`ERROR: unable to start microphone: ${e}`);
        });

      draw();

      function draw() {
        drawScope(analyser);
        drawHistogram();

        setTimeout(() => requestAnimationFrame(draw), 1000);
      }

      function drawScope(analyser) {
        const ctx = document.getElementById('scope').getContext('2d');
        const width = ctx.canvas.width;
        const height = ctx.canvas.height;
        const timeData = new Uint8Array(analyser.frequencyBinCount);
        const scaling = height / 256;
        let risingEdge = 0;
        const edgeThreshold = 5;

        analyser.getByteTimeDomainData(timeData);

        ctx.fillStyle = 'rgba(0, 20, 0, 0.1)';
        ctx.fillRect(0, 0, width, height);

        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgb(0, 200, 0)';
        ctx.beginPath();

        // No buffer overrun protection
        while (timeData[risingEdge++] - 128 > 0 && risingEdge <= width);
        if (risingEdge >= width) risingEdge = 0;

        while (timeData[risingEdge++] - 128 < edgeThreshold && risingEdge <= width);
        if (risingEdge >= width) risingEdge = 0;

        for (var x = risingEdge; x < timeData.length && x - risingEdge < width; x++)
          ctx.lineTo(x - risingEdge, height - timeData[x] * scaling);

        ctx.stroke();
      }

      function drawHistogram() {
        document.getElementById('histogram-values').innerText = JSON.stringify(histogram);
        const ctx = document.getElementById('histogram').getContext('2d');
        ctx.canvas.width = histogram.length;
        const height = ctx.canvas.height;
        ctx.fillStyle = 'rgba(0, 20, 0, 0.1)';
        ctx.fillRect(0, 0, ctx.canvas.width, height);

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgb(0, 200, 0)';
        ctx.beginPath();

        let maxValue = 0;
        for (const bin of histogram) {
          if (bin > maxValue) {
            maxValue = bin;
          }
        }
        maxValue *= 1.1;

        for (var x = 0; x < histogram.length; x++) {
          const bin = histogram[x];
          const binHeight = bin / maxValue;

          ctx.moveTo(x, height);
          ctx.lineTo(x, height - binHeight);
        }

        ctx.stroke();
      }

      function addDebug(msg) {
        document.getElementById('console').innerText += `${msg}\n`;
      }
    }());
  </script>
</body>

</html>
