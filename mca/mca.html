<html>

<head>

</head>

<body>
  <div>
    <div class="select">
      <label for="audio-source">Audio input source: </label><select id="audio-source"></select>
    </div>
    <br>
    <button id="start">Start</button>
    <button id="stop" disabled>Stop</button>
    <!--<button id="clear">Clear</button>
    <button id="export">Export</button>-->
    <br>
    <canvas id="scope" width=400 height=100></canvas>
    <br>
    <canvas id="histogram" width=1024 height=200></canvas>
    <br>
    <span id="histogram-values"></span>
    <br>
    <pre id="console"></pre>
  </div>
  <script>
    function addDebug(msg) {
      document.getElementById('console').innerText += `${msg}\n`;
    }
  </script>
  <script>
    // input device list
    (function () {
      const audioInputSelect = document.querySelector('select#audio-source');

      function getDevices() {
        navigator.mediaDevices.enumerateDevices().then(gotDevices).catch(e => addDebug(`ERROR: unable to enumerate devices - ${e}`));
      }

      function gotDevices(deviceInfos) {
        // Handles being called several times to update labels. Preserve values.
        const currentValue = audioInputSelect.value;
        while (audioInputSelect.firstChild) {
          audioInputSelect.removeChild(audioInputSelect.firstChild);
        }
        for (let i = 0; i !== deviceInfos.length; i++) {
          const deviceInfo = deviceInfos[i];
          if (deviceInfo.deviceId == '') {
            continue;
          }

          if (deviceInfo.kind === 'audioinput') {
            const option = document.createElement('option');
            option.value = deviceInfo.deviceId;
            option.text = deviceInfo.label || `microphone ${audioInputSelect.length + 1}`;
            audioInputSelect.appendChild(option);
          }
        }

        if (Array.prototype.slice.call(audioInputSelect.childNodes).some(n => n.value === currentValue)) {
          audioInputSelect.value = currentValue;
        }
      }

      getDevices();
    }());
  </script>
  <script>
    // start/stop processing
    (async function () {
      const audioInputSelect = document.querySelector('select#audio-source');
      const startButton = document.querySelector('button#start');
      const stopButton = document.querySelector('button#stop');
      startButton.addEventListener('click', () => startProcessing());
      stopButton.addEventListener('click', () => stopProcessing());

      window.AudioContext = window.AudioContext || window.webkitAudioContext;
      let audioContext = undefined;
      let renderInterval = 0;
      let minFrontPoints = 0;
      let maxFrontPoints = 0;

      async function startProcessing() {
        if (audioContext) {
          addDebug(`ERROR: Start click while audio context is present`);
          return;
        }

        const audioSource = audioInputSelect.value || undefined;
        if (!audioSource) {
          addDebug(`ERROR: No available audio source`);
          return;
        }

        clearInterval(renderInterval);
        startButton.disabled = true;
        stopButton.disabled = false;

        audioContext = new AudioContext();
        minFrontPoints = 4 * audioContext.sampleRate / 44100;
        maxFrontPoints = 12 * audioContext.sampleRate / 44100;
        const constraints = {
          audio: { deviceId: { exact: audioSource } },
          video: false
        };
        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            const microphone = audioContext.createMediaStreamSource(stream);

            // pulse processing
            const pulseProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            pulseProcessor.addEventListener("audioprocess", audioProcessingEvent => {
              processAudioData(audioProcessingEvent);
            });
            microphone.connect(pulseProcessor);

            // oscilloscope
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            pulseProcessor.connect(analyser);

            renderInterval = setInterval(() => {
              drawScope(analyser);
              drawHistogram();
            }, 100);
          })
          .catch(e => {
            addDebug(`ERROR: Unable to start media - ${e}`);
            startButton.disabled = false;
            stopButton.disabled = true;
          })
      }

      async function stopProcessing() {
        if (!audioContext) {
          addDebug(`ERROR: No audio context while stopping`);
          return;
        }

        audioContext.close();
        audioContext = undefined;
        startButton.disabled = false;
        stopButton.disabled = true;
      }

      // histogram
      const channels = 1024;
      const histogram = new Array(channels).fill(0);
      const noise = 30;

      // pulse processor
      let currentFrontPoints = 0;
      let prevValue = 0;
      let frontStartValue = 0;
      function processAudioData(audioProcessingEvent) {
        let inputBuffer = audioProcessingEvent.inputBuffer;
        let inputChannelData = inputBuffer.getChannelData(0);
        if (inputChannelData) {
          const pulses = [];
          for (i = 0; i < inputChannelData.length; i++) {
            const currentValue = inputChannelData[i] + 1; // from 0 to 2
            if (currentValue > prevValue) {
              if (currentFrontPoints === 0) {
                frontStartValue = currentValue;
              }

              currentFrontPoints++;
            } else {
              if (currentFrontPoints >= minFrontPoints && currentFrontPoints <= maxFrontPoints) {
                pulses.push(prevValue - frontStartValue);
              }

              frontStartValue = 0;
              currentFrontPoints = 0;
            }

            prevValue = currentValue;
          }

          for (pulse of pulses) {
            const bin = pulse / 1 * (histogram.length - 1);
            if (bin > noise) {
              histogram[bin]++;
            }
          }
        }
      }

      function drawScope(analyser) {
        const ctx = document.getElementById('scope').getContext('2d');
        const width = ctx.canvas.width;
        const height = ctx.canvas.height;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        analyser.getByteTimeDomainData(dataArray);
        // Fill solid color
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, width, height);
        // Begin the path
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgb(0 200 0)';
        ctx.beginPath();
        // Draw each point in the waveform
        const sliceWidth = width / analyser.frequencyBinCount;
        let x = 0;
        for (let i = 0; i < analyser.frequencyBinCount; i++) {
          const v = dataArray[i] / 128.0;
          const y = v * (height / 2);

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }

          x += sliceWidth;
        }

        // Finish the line
        ctx.lineTo(width, height / 2);
        ctx.stroke();
      }

      function drawHistogram() {
        document.getElementById('histogram-values').innerText = JSON.stringify(histogram);
        const ctx = document.getElementById('histogram').getContext('2d');
        ctx.canvas.width = histogram.length;
        const height = ctx.canvas.height;
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, ctx.canvas.width, height);

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgb(0, 200, 0)';
        ctx.beginPath();

        let maxValue = 0;
        for (const bin of histogram) {
          if (bin > maxValue) {
            maxValue = bin;
          }
        }
        maxValue *= 1.1;

        for (var x = 0; x < histogram.length; x++) {
          const bin = histogram[x];
          const binHeight = bin / maxValue;

          ctx.moveTo(x, height);
          ctx.lineTo(x, height - binHeight);
        }

        ctx.stroke();
      }
    }());
  </script>
</body>

</html>
